services:
  comobot:
    image: ghcr.io/musenming/comobot:latest
    ports:
      - "18790:18790"
    volumes:
      - comobot-data:/root/.comobot
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18790/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  comobot-data:
