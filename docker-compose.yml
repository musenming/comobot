x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - comobot-data:/root/.comobot
  env_file:
    - .env

services:
  comobot-gateway:
    container_name: comobot-gateway
    <<: *common-config
    command: ["gateway"]
    restart: unless-stopped
    ports:
      - "${COMOBOT_PORT:-18790}:18790"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    stop_grace_period: 35s

  comobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true

volumes:
  comobot-data:
