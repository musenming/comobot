name: Build Binary Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            binary: comobot
          - os: macos-latest
            target: macos-x64
            binary: comobot
          - os: windows-latest
            target: windows-x64
            binary: comobot.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .

      - name: Build standalone binary
        run: |
          pyinstaller --onefile --name comobot comobot/__main__.py

      - name: Package tar.gz
        id: package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ASSET="comobot-${VERSION}-${{ matrix.target }}.tar.gz"

          mkdir -p package/comobot
          cp "dist/${{ matrix.binary }}" package/comobot/

          if [ -f LICENSE ]; then cp LICENSE package/comobot/; fi
          if [ -f README.md ]; then cp README.md package/comobot/; fi

          tar -czf "$ASSET" -C package comobot
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ steps.package.outputs.asset }}
          if-no-files-found: error

  upload-release:
    name: Upload to GitHub Releases
    runs-on: ubuntu-latest
    needs: build-binaries
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
