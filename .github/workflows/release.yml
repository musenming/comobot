name: Build Binary Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            binary_glob: comobot*
          - os: macos-latest
            target: macos-arm64
            binary_glob: comobot*
          - os: windows-latest
            target: windows-x64
            binary_glob: comobot*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build frontend
        run: |
          cd web
          npm ci --silent
          npm run build

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .

      - name: Build onefile binary (PyInstaller)
        shell: bash
        run: |
          set -euo pipefail
          SEP=":"
          if [ "$RUNNER_OS" = "Windows" ]; then SEP=";"; fi

          # On macOS, a PyInstaller onefile binary that spawns itself inherits
          # _PYI_* env vars which break the child's bootloader extraction.
          # The fix is in the Python code (pyi_clean_env), but we also add
          # commonly missing C-extension hidden imports as a safety net.
          PLATFORM_HIDDEN=""
          if [ "$RUNNER_OS" = "Windows" ]; then
            PLATFORM_HIDDEN="--hidden-import _winapi"
          else
            PLATFORM_HIDDEN="--hidden-import _posixsubprocess --hidden-import _socket"
          fi

          pyinstaller comobot/__main__.py \
            --onefile \
            --name comobot \
            --collect-submodules comobot \
            --collect-submodules qrcode \
            --collect-all certifi \
            --collect-all litellm \
            --collect-all tiktoken \
            --collect-all tiktoken_ext \
            $PLATFORM_HIDDEN \
            --add-data "comobot/templates${SEP}comobot/templates" \
            --add-data "comobot/skills${SEP}comobot/skills" \
            --add-data "web/dist${SEP}web/dist" \
            --distpath dist \
            --noconfirm \
            --clean

      - name: Resolve built binary
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          matches=(dist/${{ matrix.binary_glob }})
          if [ ${#matches[@]} -eq 0 ]; then
            echo "No built binary found in ./dist" >&2
            ls -la dist || true
            exit 1
          fi
          BIN_PATH="${matches[0]}"
          echo "binary_path=$BIN_PATH" >> "$GITHUB_OUTPUT"

      - name: Package tar.gz
        id: package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ASSET="comobot-${VERSION}-${{ matrix.target }}.tar.gz"

          mkdir -p package/comobot
          cp "${{ steps.resolve.outputs.binary_path }}" package/comobot/

          if [ -f LICENSE ]; then cp LICENSE package/comobot/; fi
          if [ -f README.md ]; then cp README.md package/comobot/; fi

          tar -czf "$ASSET" -C package comobot

          if tar -tzf "$ASSET" | grep -E '\.(py|pyi|ts|tsx)$' >/dev/null; then
            echo "Source code files detected in release package, aborting." >&2
            tar -tzf "$ASSET" | grep -E '\.(py|pyi|ts|tsx)$' >&2 || true
            exit 1
          fi

          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.target }}
          path: ${{ steps.package.outputs.asset }}
          if-no-files-found: error

  upload-release:
    name: Upload to GitHub Releases
    runs-on: ubuntu-latest
    needs: build-binaries
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true

      # Persist dist/ artifacts so sync-cn-mirror can access them
      - name: Upload dist for CN sync
        uses: actions/upload-artifact@v6
        with:
          name: release-dist
          path: dist/
          if-no-files-found: error

  sync-cn-mirror:
    name: Sync to CN Mirror (comindx.com)
    runs-on: ubuntu-latest
    needs: upload-release
    # Only run when deploy credentials are configured
    if: ${{ vars.CN_MIRROR_ENABLED == 'true' }}

    steps:
      - name: Checkout (for install scripts)
        uses: actions/checkout@v6

      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          name: release-dist
          path: dist

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Create remote directories
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REMOTE="${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          ssh -i ~/.ssh/deploy_key "$REMOTE" \
            "mkdir -p /var/www/comobot/releases/v${VERSION} \
                      /var/www/comobot/releases/latest \
                      /var/www/comobot/scripts"

      - name: Upload release binaries
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REMOTE="${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          rsync -avz --progress \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ \
            "${REMOTE}:/var/www/comobot/releases/v${VERSION}/"

      - name: Update version.txt
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REMOTE="${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          echo -n "$VERSION" | ssh -i ~/.ssh/deploy_key "$REMOTE" \
            "cat > /var/www/comobot/releases/latest/version.txt"

      - name: Upload install scripts
        run: |
          REMOTE="${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" \
            scripts/install.sh scripts/install.ps1 \
            "${REMOTE}:/var/www/comobot/scripts/"

      - name: Verify CN mirror
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Wait briefly for nginx to serve the new file
          sleep 3
          MIRRORED=$(curl -fsSL "https://dl.comindx.com/releases/latest/version.txt")
          if [[ "$MIRRORED" != "$VERSION" ]]; then
            echo "CN mirror version mismatch: expected $VERSION, got $MIRRORED" >&2
            exit 1
          fi
          echo "CN mirror verified: v${VERSION}"
