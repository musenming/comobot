name: Build Binary Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            binary_glob: comobot*
          - os: macos-latest
            target: macos-arm64
            binary_glob: comobot*
          - os: windows-latest
            target: windows-x64
            binary_glob: comobot*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .

      - name: Build onefile binary (PyInstaller)
        shell: bash
        run: |
          set -euo pipefail
          SEP=":"
          if [ "$RUNNER_OS" = "Windows" ]; then SEP=";"; fi
          pyinstaller comobot/__main__.py \
            --onefile \
            --name comobot \
            --collect-submodules comobot \
            --add-data "comobot/templates${SEP}comobot/templates" \
            --add-data "comobot/skills${SEP}comobot/skills" \
            --distpath build \
            --noconfirm \
            --clean

      - name: Resolve built binary
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          matches=(build/${{ matrix.binary_glob }})
          if [ ${#matches[@]} -eq 0 ]; then
            echo "No built binary found in ./build" >&2
            ls -la build || true
            exit 1
          fi
          BIN_PATH="${matches[0]}"
          echo "binary_path=$BIN_PATH" >> "$GITHUB_OUTPUT"

      - name: Package tar.gz
        id: package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ASSET="comobot-${VERSION}-${{ matrix.target }}.tar.gz"

          mkdir -p package/comobot
          cp "${{ steps.resolve.outputs.binary_path }}" package/comobot/

          if [ -f LICENSE ]; then cp LICENSE package/comobot/; fi
          if [ -f README.md ]; then cp README.md package/comobot/; fi

          tar -czf "$ASSET" -C package comobot

          if tar -tzf "$ASSET" | grep -E '\.(py|pyi|ts|tsx|js|jsx)$' >/dev/null; then
            echo "Source code files detected in release package, aborting." >&2
            tar -tzf "$ASSET" | grep -E '\.(py|pyi|ts|tsx|js|jsx)$' >&2 || true
            exit 1
          fi

          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ steps.package.outputs.asset }}
          if-no-files-found: error

  upload-release:
    name: Upload to GitHub Releases
    runs-on: ubuntu-latest
    needs: build-binaries
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
