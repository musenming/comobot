<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">ComindX favicon</title>
  <desc id="desc">Dark rounded square with cyan rings and center dot.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0F3B52" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0B101A" stop-opacity="0"/>
    </radialGradient>
    <filter id="ringGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="14" fill="#070B14"/>
  <circle cx="32" cy="32" r="24" fill="url(#bgGlow)"/>

  <circle cx="32" cy="32" r="19" stroke="#C9D2DE" stroke-opacity="0.55" stroke-width="2.8"/>
  <circle cx="32" cy="32" r="10" stroke="#22D3EE" stroke-width="3.2" filter="url(#ringGlow)"/>
  <circle cx="32" cy="32" r="3.2" fill="#22D3EE" filter="url(#ringGlow)"/>
</svg>
